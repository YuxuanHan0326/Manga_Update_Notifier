name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r platform/backend/requirements.txt --strict

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Frontend audit
        run: |
          cd platform/frontend
          pnpm install --no-frozen-lockfile
          pnpm audit --prod --audit-level high

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t local/manga-update-platform:scan platform

      - name: Trivy scan
        # Run Trivy via container to avoid setup-trivy binary install failures.
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.61.0 image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --exit-code 1 \
            local/manga-update-platform:scan

      - name: Upload Trivy result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
